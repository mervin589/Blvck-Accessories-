<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
  <link rel="stylesheet" href="https://unpkg.com/@staticcms/core@^4.0.0/dist/static-cms.css" />
</head>
<body>
  <script src="https://unpkg.com/@staticcms/core@^4.0.0/dist/static-cms.js"></script>
  <script>
    window.CMS.init({
      config: {
        backend: {
          name: "github",
          repo: "mervin589/Blvck-Accessories-",
          branch: "main",

          auth_endpoint: "https://api.staticcms.org/v1/auth"
        },
        load_config_file: false,
        media_folder: "assets/products",
        public_folder: "/assets/products",
        collections: [
          {
            name: "products",
            label: "Products",
            folder: "_products",
            create: true,
            slug: "{{name}}",
            fields: [
              { label: "Name", name: "name", widget: "string" },
              { label: "Price", name: "price", widget: "string" },
              { label: "Category", name: "category", widget: "select", options: ["AirPods", "Watches", "Bags", "Sunglasses"] },
              { label: "Product Image", name: "image", widget: "image", choose_url: false },
              { label: "Description", name: "body", widget: "markdown" }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
