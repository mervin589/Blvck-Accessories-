<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blvck Accessories Admin</title>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</head>
<body>
  <script>
    CMS.init({
      config: {
        backend: {
          name: 'github',
          repo: 'Mervin-Kasonga/Blvck-Accessories', // Verify this matches your GitHub repo path
          branch: 'main',
        },
        // THESE TWO LINES ARE CRITICAL FOR THE UPLOAD BUTTON
        media_folder: 'assets/products', 
        public_folder: '/assets/products',
        
        site_url: 'https://mervin-kasonga.github.io/Blvck-Accessories',
        
        collections: [
          {
            name: 'products',
            label: 'Products',
            folder: '_products',
            create: true,
            slug: '{{slug}}',
            fields: [
              { label: 'Name', name: 'title', widget: 'string' },
              { label: 'Price', name: 'price', widget: 'string' },
              { label: 'Category', name: 'category', widget: 'string' },
              // ADDING 'choose_url: false' FORCES THE UPLOAD DIALOG
              { 
                label: 'Product Image', 
                name: 'image', 
                widget: 'image', 
                choose_url: false 
              },
              { label: 'Description', name: 'body', widget: 'markdown' }
            ],
          },
        ],
      },
    });
  </script>
</body>
</html>
