<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Admin</title>
  <script>
    window.CMS_CONFIG = {
      config: {
        backend: {
          name: "github",
          repo: "mervin589/Blvck-Accessories-",
          branch: "main",
          auth_endpoint: "https://api.staticcms.org/v1/auth"
        },
        // ADDED: This creates a folder in GitHub to store your uploaded photos
        media_folder: "assets/products",
        public_folder: "/assets/products",
        collections: [
          {
            name: "products",
            label: "Products",
            folder: "_products",
            create: true,
            slug: "{{name}}",
            fields: [
              {label: "Name", name: "name", widget: "string"},
              {label: "Price", name: "price", widget: "string"},
              {label: "Category", name: "category", widget: "select", options: ["AirPods", "Watches", "Bags", "Sunglasses"]},
              {label: "Product Image", name: "image", widget: "image"}, // ADDED: The upload button
              {label: "Description", name: "body", widget: "markdown"}
            ]
          }
        ]
      }
    };
  </script>
</head>
<body>
</body>
</html>
