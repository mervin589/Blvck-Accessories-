backend:
  name: github
  repo: [Your-Username]/[Your-Repo-Name] # Replace with your info
  branch: main

media_folder: "assets/images/uploads" # Where images will be saved in your repo
public_folder: "/assets/images/uploads" # Where the website looks for them

collections:
  - name: "products"
    label: "Products"
    folder: "_products" # Or wherever your product files are stored
    create: true
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Price", name: "price", widget: "number" }
      - { label: "Product Image", name: "image", widget: "image" } # This 'image' widget triggers the upload button
