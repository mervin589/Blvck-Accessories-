<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLVCK ACCESSORIES | Premium Minimalist Luxury</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-black: #000000;
            --secondary-black: #0a0a0a;
            --accent-gold: #d4af37; /* Brighter Gold for visibility */
            --pure-white: #ffffff;
            --gray-text: #a0a0a0;
        }

        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--primary-black); color: var(--pure-white); line-height: 1.6;}
        
        /* Header Fixes */
        header {background: var(--secondary-black); padding: 1.5rem 0; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #1a1a1a;}
        .nav {display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 0 20px;}
        .logo {font-size: 1.5rem; font-weight: 900; letter-spacing: 4px; color: #fff; text-decoration: none; text-transform: uppercase;}
        .logo span {color: var(--accent-gold);}

        .search-container {flex: 1; max-width: 350px; position: relative; margin: 0 20px;}
        .search-container input {width: 100%; background: #111; border: 1px solid #222; padding: 10px 15px; color: #fff; border-radius: 4px;}

        .nav-actions {display: flex; gap: 20px; align-items: center;}
        .icon-btn {font-size: 1.2rem; cursor: pointer; position: relative; transition: 0.3s;}
        .cart-count {background: var(--accent-gold); color: #000; border-radius: 50%; padding: 2px 6px; font-size: 10px; position: absolute; top: -10px; right: -10px;}

        /* Category Bar Fix */
        .category-bar {background: #050505; padding: 15px 0; border-bottom: 1px solid #111; text-align: center; overflow-x: auto; white-space: nowrap;}
        .category-item {display: inline-block; padding: 8px 20px; margin: 0 5px; border: 1px solid #222; cursor: pointer; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gray-text);}
        .category-item.active {border-color: var(--accent-gold); color: var(--accent-gold);}

        /* Product Grid */
        .product-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; padding: 40px 20px; max-width: 1200px; margin: 0 auto;}
        .product-card {background: #080808; border: 1px solid #151515; padding: 15px; transition: 0.3s;}
        .product-card:hover {border-color: var(--accent-gold);}
        .product-img {width: 100%; height: 300px; object-fit: cover; margin-bottom: 15px; background: #111;}
        .product-name {font-weight: bold; font-size: 1rem; margin-bottom: 5px; text-transform: uppercase;}
        .product-price {color: var(--accent-gold); font-weight: bold; margin-bottom: 15px;}

        /* Button Styling */
        .btn {width: 100%; padding: 12px; border: none; cursor: pointer; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; transition: 0.3s;}
        .btn-gold {background: var(--accent-gold); color: #000;}
        .btn-gold:hover {background: #fff;}
        .btn-outline {background: transparent; border: 1px solid #333; color: #fff;}

        /* Modal Settings */
        .modal {display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000;}
        .modal-content {background: #0a0a0a; border: 1px solid #222; width: 90%; max-width: 500px; margin: 50px auto; padding: 30px; position: relative;}
        .close {position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; color: var(--accent-gold);}

        .form-group {margin-bottom: 20px;}
        .form-group label {display: block; font-size: 0.7rem; color: var(--accent-gold); margin-bottom: 8px; text-transform: uppercase;}
        .form-group input, .form-group select {width: 100%; padding: 12px; background: #111; border: 1px solid #222; color: #fff; outline: none;}

        .admin-item {display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #111;}
    </style>
</head>
<body>

    <header>
        <div class="nav">
            <a href="#" class="logo">BLVCK<span> ACCESSORIES</span></a>
            <div class="search-container">
                <input type="text" id="pSearch" placeholder="Search..." onkeyup="handleSearch()">
            </div>
            <div class="nav-actions">
                <div class="icon-btn" onclick="openM('loginModal')"><i class="fas fa-user"></i></div>
                <div class="icon-btn" onclick="openM('cartModal')">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </div>
            </div>
        </div>
    </header>

    <div class="category-bar" id="catBar"></div>

    <div class="product-grid" id="pGrid"></div>

    <!-- Modals -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeM('cartModal')">&times;</span>
            <h2 style="margin-bottom:20px">YOUR BAG</h2>
            <div id="cartItems"></div>
            <div id="cartTotal" style="margin: 20px 0; border-top: 1px solid #222; padding-top: 10px;"></div>
            <button class="btn btn-gold" onclick="goToCheckout()">Checkout Now</button>
        </div>
    </div>

    <div id="checkoutModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeM('checkoutModal')">&times;</span>
            <h2 style="margin-bottom:20px">DELIVERY</h2>
            <div class="form-group"><label>Name</label><input type="text" id="cName"></div>
            <div class="form-group"><label>District</label>
                <select id="cDist">
                    <option value="Blantyre">Blantyre</option><option value="Lilongwe">Lilongwe</option>
                    <option value="Zomba">Zomba</option><option value="Mzuzu">Mzuzu</option>
                    <!-- Add other 24 districts here -->
                    <option value="Mangochi">Mangochi</option><option value="Kasungu">Kasungu</option>
                </select>
            </div>
            <div class="form-group"><label>Courier</label>
                <select id="cCourier">
                    <option value="Door to Door">Door to Door</option>
                    <option value="CTS">CTS</option>
                    <option value="Post Office">Post Office</option>
                    <option value="Speed Courier">Speed Courier</option>
                </select>
            </div>
            <button class="btn btn-gold" onclick="sendWhatsApp()">Confirm via WhatsApp</button>
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeM('loginModal')">&times;</span>
            <h3>Admin Access</h3>
            <input type="password" id="pass" placeholder="Access Key" style="width:100%; margin:20px 0; padding:10px;">
            <button class="btn btn-gold" onclick="checkLogin()">Login</button>
            <hr style="margin:20px 0; border:#222">
            <button class="btn btn-outline" style="color:red; border-color:red;" onclick="resetStore()">Hard Reset (Fix View Issues)</button>
        </div>
    </div>

    <div id="adminModal" class="modal">
        <div class="modal-content" style="max-width:600px;">
            <span class="close" onclick="closeM('adminModal')">&times;</span>
            <h2>Store Manager</h2>
            <div style="display:flex; gap:10px; margin:20px 0;">
                <button class="btn btn-gold" onclick="openM('addPModal')">Add Product</button>
                <button class="btn btn-outline" onclick="openM('catMModal')">Categories</button>
            </div>
            <div id="adminList"></div>
        </div>
    </div>

    <!-- Hidden Utility Modals -->
    <div id="addPModal" class="modal"><div class="modal-content">
        <span class="close" onclick="closeM('addPModal')">&times;</span>
        <h3>Add Product</h3>
        <div class="form-group"><label>Category</label><select id="nCat"></select></div>
        <div class="form-group"><label>Name</label><input type="text" id="nName"></div>
        <div class="form-group"><label>Price (MK)</label><input type="number" id="nPrice"></div>
        <div class="form-group"><label>Image URL</label><input type="text" id="nImg"></div>
        <button class="btn btn-gold" onclick="saveP()">Save</button>
    </div></div>

    <script>
        const WA_NUM = '265881887598';
        let items = JSON.parse(localStorage.getItem('blv_items')) || [];
        let cats = JSON.parse(localStorage.getItem('blv_cats')) || ['All', 'Glasses', 'Hats'];
        let cart = [];
        let currentFilter = 'All';

        function init() {
            renderCats();
            renderP();
        }

        function renderCats() {
            document.getElementById('catBar').innerHTML = cats.map(c => 
                `<div class="category-item ${currentFilter === c ? 'active' : ''}" onclick="filterP('${c}')">${c}</div>`
            ).join('');
            document.getElementById('nCat').innerHTML = cats.filter(c => c !== 'All').map(c => `<option>${c}</option>`).join('');
        }

        function filterP(c) { currentFilter = c; renderCats(); renderP(); }

        function renderP(list = null) {
            const data = list || (currentFilter === 'All' ? items : items.filter(i => i.cat === currentFilter));
            document.getElementById('pGrid').innerHTML = data.map(i => `
                <div class="product-card">
                    <img src="${i.img}" class="product-img">
                    <div class="product-name">${i.name}</div>
                    <div class="product-price">MK ${parseInt(i.price).toLocaleString()}</div>
                    <button class="btn btn-gold" onclick="addToCart(${i.id})">Add to Bag</button>
                </div>
            `).join('');

            document.getElementById('adminList').innerHTML = items.map(i => `
                <div class="admin-item">
                    <span>${i.name}</span>
                    <button onclick="deleteP(${i.id})" style="background:none; border:none; color:red; cursor:pointer;">Delete</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = items.find(i => i.id === id);
            cart.push(product);
            document.getElementById('cartCount').innerText = cart.length;
            alert('Added to bag');
        }

        function openM(id) { document.getElementById(id).style.display = 'block'; }
        function closeM(id) { document.getElementById(id).style.display = 'none'; }

        function saveP() {
            const p = {
                id: Date.now(),
                cat: document.getElementById('nCat').value,
                name: document.getElementById('nName').value,
                price: document.getElementById('nPrice').value,
                img: document.getElementById('nImg').value
            };
            items.push(p);
            localStorage.setItem('blv_items', JSON.stringify(items));
            renderP();
            closeM('addPModal');
        }

        function deleteP(id) {
            items = items.filter(i => i.id !== id);
            localStorage.setItem('blv_items', JSON.stringify(items));
            renderP();
        }

        function checkLogin() {
            if(document.getElementById('pass').value === 'blvck2024') {
                closeM('loginModal');
                openM('adminModal');
            } else { alert('Wrong key'); }
        }

        function resetStore() {
            if(confirm("This will clear all your saved items and reset the view. Continue?")) {
                localStorage.clear();
                location.reload();
            }
        }

        function sendWhatsApp() {
            const name = document.getElementById('cName').value;
            const dist = document.getElementById('cDist').value;
            const cour = document.getElementById('cCourier').value;
            let text = `*NEW ORDER: BLVCK ACCESSORIES*%0AName: ${name}%0ADistrict: ${dist}%0ACourier: ${cour}%0A%0AItems:%0A`;
            cart.forEach(i => text += `- ${i.name} (MK ${i.price})%0A`);
            window.open(`https://wa.me/${WA_NUM}?text=${text}`);
        }

        init();
    </script>
</body>
</html>
