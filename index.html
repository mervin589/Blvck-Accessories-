<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLVCK ACCESSORIES | Luxury Redefined</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-black: #0a0a0a;
            --secondary-black: #111;
            --accent-gold: #c5a059;
            --pure-white: #ffffff;
            --gray-text: #aaa;
        }

        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; color: #fff; line-height: 1.6;}
        .container {max-width: 1200px; margin: 0 auto; padding: 0 20px;}
        
        /* Header & Nav */
        header {background: var(--secondary-black); padding: 1.2rem 0; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222;}
        .nav {display: flex; justify-content: space-between; align-items: center; gap: 20px;}
        .logo {display: flex; align-items: center; gap: 12px; font-size: 1.4rem; font-weight: 800; letter-spacing: 3px; cursor: pointer; text-decoration: none; color: #fff;}
        .logo span {color: var(--accent-gold);}
        .search-container {flex: 1; max-width: 400px; position: relative; display: flex; align-items: center;}
        .search-container input {width: 100%; background: #000; border: 1px solid #333; padding: 10px 40px 10px 15px; color: #fff; border-radius: 20px; outline: none;}
        .search-container i {position: absolute; right: 15px; color: #666;}
        .nav-actions {display: flex; gap: 25px; align-items: center;}
        .icon-btn {font-size: 1.3rem; color: #fff; cursor: pointer; position: relative;}
        .cart-count {background: var(--accent-gold); color: #000; border-radius: 50%; padding: 2px 6px; font-size: 11px; font-weight: bold; position: absolute; top: -8px; right: -10px;}

        /* Hero */
        .hero {padding: 80px 0; text-align: center; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1490367532201-b9bc1dc483f6?w=1200'); background-size: cover; background-position: center;}
        .hero h1 {font-size: 3rem; margin-bottom: 1rem; letter-spacing: 5px; font-weight: 900;}

        /* Categories Bar */
        .category-bar {padding: 20px 0; background: #050505; border-bottom: 1px solid #111; overflow-x: auto; white-space: nowrap; text-align: center;}
        .category-item {display: inline-block; padding: 8px 20px; margin: 0 5px; border: 1px solid #222; cursor: pointer; transition: 0.3s; font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase;}
        .category-item:hover, .category-item.active {border-color: var(--accent-gold); color: var(--accent-gold);}

        /* Products Grid */
        .products {padding: 50px 0;}
        .product-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px;}
        .product-card {background: #0a0a0a; border: 1px solid #111; transition: 0.4s;}
        .product-card:hover {border-color: var(--accent-gold);}
        .product-img {width: 100%; height: 350px; object-fit: cover;}
        .product-info {padding: 25px; text-align: center;}
        .product-price {font-size: 1.2rem; font-weight: 700; color: var(--accent-gold); margin-bottom: 15px;}

        /* Modals & Forms */
        .modal {display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto;}
        .modal-content {background: #0a0a0a; margin: 30px auto; padding: 30px; max-width: 500px; border: 1px solid var(--accent-gold);}
        .close {float: right; font-size: 28px; cursor: pointer; color: var(--accent-gold);}
        .form-group {margin-bottom: 20px;}
        .form-group label {display: block; margin-bottom: 8px; font-size: 0.8rem; color: var(--accent-gold);}
        .form-group input, .form-group select, .form-group textarea {width: 100%; padding: 12px; background: #111; border: 1px solid #222; color: #fff;}
        .btn {padding: 12px 24px; border: none; cursor: pointer; font-weight: 600; text-transform: uppercase; width: 100%; transition: 0.3s;}
        .btn-primary {background: #fff; color: #000;}
        .btn-primary:hover {background: var(--accent-gold);}

        /* Admin Layout */
        .admin-section {margin-top: 30px; border-top: 1px solid #222; padding-top: 20px;}
        .admin-item {display: flex; justify-content: space-between; background: #111; padding: 10px; margin-bottom: 5px; font-size: 0.9rem;}

        footer {background: #050505; padding: 60px 0; border-top: 1px solid #111; text-align: center; color: #444;}
    </style>
</head>
<body>

    <header>
        <div class="container">
            <div class="nav">
                <a href="#" class="logo"><span>BLVCK</span> ACCESSORIES</a>
                <div class="search-container">
                    <input type="text" id="productSearch" placeholder="Search collection..." onkeyup="searchProducts()">
                    <i class="fas fa-search"></i>
                </div>
                <div class="nav-actions">
                    <div class="icon-btn" onclick="openModal('loginModal')"><i class="fas fa-user-circle"></i></div>
                    <div class="icon-btn" onclick="openModal('cartModal')">
                        <i class="fas fa-shopping-bag"></i>
                        <span class="cart-count" id="cartCount">0</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>ESSENTIAL LUXURY</h1>
            <p style="color: #888;">Premium Goods. Curated for the Bold.</p>
        </div>
    </section>

    <!-- Category Bar -->
    <div class="category-bar" id="categoryBar">
        <!-- Categories will load here -->
    </div>

    <section class="products">
        <div class="container">
            <div class="product-grid" id="productGrid"></div>
        </div>
    </section>

    <!-- Cart Modal -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('cartModal')">&times;</span>
            <h2 style="margin-bottom: 20px;">YOUR BAG</h2>
            <div id="cartItems"></div>
            <div id="cartTotal" style="margin: 20px 0; font-weight: bold; color: var(--accent-gold);"></div>
            <button class="btn btn-primary" onclick="openModal('checkoutModal'); closeModal('cartModal')">Checkout</button>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminModal" class="modal">
        <div class="modal-content" style="max-width: 800px;">
            <span class="close" onclick="closeModal('adminModal')">&times;</span>
            <h2>MANAGEMENT</h2>
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-primary" onclick="openModal('addProductModal')">Add Product</button>
                <button class="btn btn-primary" onclick="openModal('manageCatModal')">Manage Categories</button>
            </div>

            <div class="admin-section">
                <h3>Current Products</h3>
                <div id="adminProductGrid"></div>
            </div>
        </div>
    </div>

    <!-- Manage Categories Modal -->
    <div id="manageCatModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('manageCatModal')">&times;</span>
            <h3>CATEGORIES</h3>
            <div class="form-group" style="margin-top: 15px;">
                <input type="text" id="newCatName" placeholder="New Category Name (e.g. Hats)">
                <button class="btn btn-primary" style="margin-top: 10px;" onclick="addCategory()">Add Category</button>
            </div>
            <div id="adminCatList"></div>
        </div>
    </div>

    <!-- Add Product Modal -->
    <div id="addProductModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('addProductModal')">&times;</span>
            <h3>NEW PRODUCT</h3>
            <div class="form-group">
                <label>Category</label>
                <select id="pCatSelect"></select>
            </div>
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="pName">
            </div>
            <div class="form-group">
                <label>Price (MK)</label>
                <input type="number" id="pPrice">
            </div>
            <div class="form-group">
                <label>Image URL</label>
                <input type="text" id="pImage">
            </div>
            <button class="btn btn-primary" onclick="addProduct()">Save Product</button>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('loginModal')">&times;</span>
            <h3>ADMIN LOGIN</h3>
            <input type="password" id="adminPass" style="width:100%; padding:10px; margin:20px 0;">
            <button class="btn btn-primary" onclick="login()">Access</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 BLVCK ACCESSORIES. ESTABLISHED IN MALAWI.</p>
    </footer>

    <script>
        const ADMIN_PASS = 'blvck2024';
        let categories = JSON.parse(localStorage.getItem('blvck_cats')) || ['All', 'Glasses', 'Bags', 'Hats'];
        let products = JSON.parse(localStorage.getItem('blvck_products')) || [];
        let cart = JSON.parse(localStorage.getItem('blvck_cart')) || [];
        let currentFilter = 'All';

        function init() {
            renderCategories();
            renderProducts();
            updateCartCount();
        }

        // --- Category Logic ---
        function renderCategories() {
            const bar = document.getElementById('categoryBar');
            bar.innerHTML = categories.map(cat => `
                <div class="category-item ${currentFilter === cat ? 'active' : ''}" onclick="filterBy('${cat}')">
                    ${cat}
                </div>
            `).join('');

            // Update Admin Select
            const select = document.getElementById('pCatSelect');
            select.innerHTML = categories.filter(c => c !== 'All').map(c => `<option value="${c}">${c}</option>`).join('');
            
            // Update Admin List
            const list = document.getElementById('adminCatList');
            list.innerHTML = categories.filter(c => c !== 'All').map(c => `
                <div class="admin-item">
                    ${c} <span style="color:red; cursor:pointer;" onclick="deleteCategory('${c}')">Delete</span>
                </div>
            `).join('');
        }

        function addCategory() {
            const val = document.getElementById('newCatName').value.trim();
            if(val && !categories.includes(val)) {
                categories.push(val);
                saveCats();
                renderCategories();
                document.getElementById('newCatName').value = '';
            }
        }

        function deleteCategory(cat) {
            categories = categories.filter(c => c !== cat);
            saveCats();
            renderCategories();
        }

        function filterBy(cat) {
            currentFilter = cat;
            renderCategories();
            renderProducts();
        }

        // --- Product Logic ---
        function renderProducts() {
            const grid = document.getElementById('productGrid');
            const filtered = currentFilter === 'All' ? products : products.filter(p => p.category === currentFilter);
            
            grid.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <img src="${p.image}" class="product-img" onerror="this.src='https://via.placeholder.com/400x500/111/fff?text=Product'">
                    <div class="product-info">
                        <div style="font-size:0.7rem; color:var(--accent-gold); margin-bottom:5px;">${p.category}</div>
                        <div style="font-weight:bold; margin-bottom:10px;">${p.name}</div>
                        <div class="product-price">MK ${parseInt(p.price).toLocaleString()}</div>
                        <button class="btn btn-primary" onclick="addToCart(${p.id})">Add to Bag</button>
                    </div>
                </div>
            `).join('');

            // Also render admin list
            const adminGrid = document.getElementById('adminProductGrid');
            adminGrid.innerHTML = products.map(p => `
                <div class="admin-item">
                    <span>${p.name} (${p.category})</span>
                    <span style="color:red; cursor:pointer;" onclick="deleteProduct(${p.id})">Remove</span>
                </div>
            `).join('');
        }

        function addProduct() {
            const p = {
                id: Date.now(),
                category: document.getElementById('pCatSelect').value,
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                image: document.getElementById('pImage').value
            };
            if(!p.name || !p.price) return;
            products.push(p);
            saveProducts();
            renderProducts();
            closeModal('addProductModal');
        }

        function deleteProduct(id) {
            products = products.filter(p => p.id !== id);
            saveProducts();
            renderProducts();
        }

        function searchProducts() {
            const q = document.getElementById('productSearch').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(q));
            const grid = document.getElementById('productGrid');
            grid.innerHTML = filtered.map(p => `
                <div class="product-card">...</div> <!-- Simplified for logic -->
            `).join(''); 
            // Note: Re-running renderProducts with the search filter is better practice.
        }

        // --- Cart & Utility ---
        function addToCart(id) {
            const item = products.find(p => p.id === id);
            cart.push(item);
            saveCart();
            updateCartCount();
            alert('Added to bag!');
        }

        function updateCartCount() {
            document.getElementById('cartCount').textContent = cart.length;
        }

        function login() {
            if(document.getElementById('adminPass').value === ADMIN_PASS) {
                closeModal('loginModal');
                openModal('adminModal');
            } else { alert('Wrong pass'); }
        }

        function saveCats() { localStorage.setItem('blvck_cats', JSON.stringify(categories)); }
        function saveProducts() { localStorage.setItem('blvck_products', JSON.stringify(products)); }
        function saveCart() { localStorage.setItem('blvck_cart', JSON.stringify(cart)); }

        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        init();
    </script>
</body>
</html>
