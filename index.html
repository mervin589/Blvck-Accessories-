<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLVCK ACCESSORIES | Luxury Accessories in Malawi</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; color: #fff; line-height: 1.6;}
        .container {max-width: 1200px; margin: 0 auto; padding: 0 20px;}
        header {background: #111; padding: 1rem 0; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222;}
        .nav {display: flex; justify-content: space-between; align-items: center;}
        .logo {display: flex; align-items: center; gap: 10px; font-size: 1.5rem; font-weight: 700; letter-spacing: 2px;}
        .logo img {width: 35px; height: 35px; object-fit: contain;}
        .nav-actions {display: flex; gap: 15px; align-items: center;}
        .btn {padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; transition: all 0.3s;}
        .btn-primary {background: #fff; color: #000;}
        .btn-primary:hover {background: #ddd;}
        .btn-outline {background: transparent; border: 1px solid #fff; color: #fff;}
        .btn-outline:hover {background: #fff; color: #000;}
        .cart-count {background: #ff3b30; color: #fff; border-radius: 50%; padding: 2px 6px; font-size: 12px; margin-left: 5px;}
        .hero {padding: 80px 0; text-align: center; background: linear-gradient(135deg, #111 0%, #000 100%);}
        .hero h1 {font-size: 3rem; margin-bottom: 1rem; letter-spacing: 3px;}
        .hero p {font-size: 1.2rem; color: #aaa; margin-bottom: 2rem;}
        .products {padding: 60px 0;}
        .section-title {text-align: center; font-size: 2rem; margin-bottom: 40px; letter-spacing: 2px;}
        .product-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px;}
        .product-card {background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #222; transition: transform 0.3s;}
        .product-card:hover {transform: translateY(-5px);}
        .product-img {width: 100%; height: 300px; object-fit: cover; background: #222;}
        .product-info {padding: 20px;}
        .product-name {font-size: 1.1rem; margin-bottom: 10px;}
        .product-price {font-size: 1.3rem; font-weight: 700; margin-bottom: 15px;}
        .modal {display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; overflow-y: auto;}
        .modal-content {background: #111; margin: 50px auto; padding: 30px; border-radius: 10px; max-width: 500px; position: relative; border: 1px solid #222;}
        .close {position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer;}
        .form-group {margin-bottom: 20px;}
        .form-group label {display: block; margin-bottom: 8px; font-weight: 600;}
        .form-group input, .form-group select, .form-group textarea {width: 100%; padding: 12px; background: #000; border: 1px solid #333; border-radius: 5px; color: #fff; font-size: 16px;}
        .cart-item {display: flex; gap: 15px; padding: 15px 0; border-bottom: 1px solid #222;}
        .cart-item img {width: 80px; height: 80px; object-fit: cover; border-radius: 5px;}
        .cart-item-info {flex: 1;}
        .cart-item-actions {display: flex; gap: 10px; align-items: center; margin-top: 10px;}
        .qty-btn {width: 30px; height: 30px; background: #222; border: none; color: #fff; cursor: pointer; border-radius: 3px;}
        .admin-panel {display: none;}
        .admin-grid {display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px;}
        .admin-card {background: #111; padding: 20px; border-radius: 10px; border: 1px solid #222;}
        footer {background: #111; padding: 40px 0; text-align: center; margin-top: 60px; border-top: 1px solid #222;}
        .footer-links {display: flex; justify-content: center; gap: 30px; margin-bottom: 20px;}
        .footer-links a {color: #aaa; text-decoration: none; cursor: pointer;}
        .footer-links a:hover {color: #fff;}
        @media (max-width: 768px) {
            .hero h1 {font-size: 2rem;}
            .product-grid {grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px;}
            .modal-content {margin: 20px; padding: 20px;}
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="nav">
                <div class="logo">
                    <img src="logo.png" alt="Logo" onerror="this.style.display='none'">
                    <span>BLVCK ACCESSORIES</span>
                </div>
                <div class="nav-actions">
                    <button class="btn btn-outline" onclick="openModal('cartModal')">Cart <span class="cart-count" id="cartCount">0</span></button>
                    <button class="btn btn-primary" onclick="openModal('loginModal')">Admin</button>
                </div>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>LUXURY REDEFINED</h1>
            <p>Premium accessories delivered across Malawi</p>
            <button class="btn btn-primary" onclick="document.getElementById('products').scrollIntoView()">Shop Now</button>
        </div>
    </section>

    <section class="products" id="products">
        <div class="container">
            <h2 class="section-title">COLLECTION</h2>
            <div class="product-grid" id="productGrid"></div>
        </div>
    </section>

    <!-- Cart Modal -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('cartModal')">&times;</span>
            <h2>Your Cart</h2>
            <div id="cartItems"></div>
            <div id="cartTotal" style="margin: 20px 0; font-size: 1.3rem; font-weight: 700;"></div>
            <button class="btn btn-primary" style="width: 100%;" onclick="openModal('checkoutModal'); closeModal('cartModal')">Checkout</button>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div id="checkoutModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('checkoutModal')">&times;</span>
            <h2>Checkout</h2>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="customerName" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="customerPhone" required>
            </div>
            <div class="form-group">
                <label>Delivery Location</label>
                <select id="deliveryLocation" onchange="updateDeliveryPrice()">
                    <option value="Blantyre" data-price="3000">Blantyre - MK 3,000</option>
                    <option value="Limbe" data-price="3000">Limbe - MK 3,000</option>
                    <option value="Lilongwe" data-price="10000">Lilongwe - MK 10,000</option>
                    <option value="Mzuzu" data-price="15000">Mzuzu - MK 15,000</option>
                    <option value="Zomba" data-price="7000">Zomba - MK 7,000</option>
                </select>
            </div>
            <div id="checkoutSummary" style="margin: 20px 0; padding: 15px; background: #000; border-radius: 5px;"></div>
            <button class="btn btn-primary" style="width: 100%;" onclick="sendWhatsAppOrder()">Complete Order via WhatsApp</button>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('loginModal')">&times;</span>
            <h2>Admin Login</h2>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="adminPassword">
            </div>
            <button class="btn btn-primary" style="width: 100%;" onclick="login()">Login</button>
        </div>
    </div>

    <!-- Admin Modal -->
    <div id="adminModal" class="modal">
        <div class="modal-content" style="max-width: 900px;">
            <span class="close" onclick="closeModal('adminModal')">&times;</span>
            <h2>Admin Panel</h2>
            <button class="btn btn-primary" onclick="openModal('addProductModal')">Add Product</button>
            <button class="btn btn-outline" onclick="logout()">Logout</button>
            <div class="admin-grid" id="adminProductGrid"></div>
        </div>
    </div>

    <!-- Add Product Modal -->
    <div id="addProductModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('addProductModal')">&times;</span>
            <h2>Add Product</h2>
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="newProductName">
            </div>
            <div class="form-group">
                <label>Price (MK)</label>
                <input type="number" id="newProductPrice">
            </div>
            <div class="form-group">
                <label>Image URL</label>
                <input type="text" id="newProductImage" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="newProductDesc" rows="3"></textarea>
            </div>
            <button class="btn btn-primary" style="width: 100%;" onclick="addProduct()">Save Product</button>
        </div>
    </div>

    <footer>
        <div class="container">
            <div class="footer-links">
                <a onclick="openModal('loginModal')">Admin</a>
                <a href="https://wa.me/265881887598" target="_blank">WhatsApp</a>
            </div>
            <p>&copy; 2026 BLVCK ACCESSORIES. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // CONFIG
        const ADMIN_PASSWORD = 'blvck2024';
        const WHATSAPP_NUMBER = '265881887598';
        
        // STATE
        let products = JSON.parse(localStorage.getItem('blvck_products')) || [
            {id: 1, name: 'Classic Black Wallet', price: 25000, image: 'https://images.unsplash.com/photo-1627123424574-724758594e93?w=400', desc: 'Genuine leather wallet'},
            {id: 2, name: 'Silver Chain Necklace', price: 18000, image: 'https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?w=400', desc: 'Stainless steel chain'},
            {id: 3, name: 'Leather Belt', price: 22000, image: 'https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=400', desc: 'Premium leather belt'},
            {id: 4, name: 'Sunglasses', price: 35000, image: 'https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400', desc: 'UV protection'},
            {id: 5, name: 'Wristwatch', price: 45000, image: 'https://images.unsplash.com/photo-1524592094714-0f0654e20314?w=400', desc: 'Quartz movement'},
            {id: 6, name: 'Leather Bag', price: 55000, image: 'https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=400', desc: 'Handcrafted leather'}
        ];
        let cart = JSON.parse(localStorage.getItem('blvck_cart')) || [];
        let isAdmin = false;

        // INIT
        document.addEventListener('DOMContentLoaded', function() {
            renderProducts();
            updateCartCount();
        });

        // PRODUCTS
        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    <img src="${p.image}" alt="${p.name}" class="product-img" onerror="this.src='https://via.placeholder.com/400x400/222/fff?text=No+Image'">
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">MK ${p.price.toLocaleString()}</div>
                        <button class="btn btn-primary" style="width: 100%;" onclick="addToCart(${p.id})">Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }

        // CART
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const existing = cart.find(item => item.id === id);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({...product, qty: 1});
            }
            saveCart();
            updateCartCount();
            alert('Added to cart!');
        }

        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cartCount').textContent = count;
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            if (cart.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #aaa; padding: 40px 0;">Your cart is empty</p>';
                document.getElementById('cartTotal').textContent = '';
                return;
            }
            container.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <img src="${item.image}" alt="${item.name}">
                    <div class="cart-item-info">
                        <div style="font-weight: 600;">${item.name}</div>
                        <div style="color: #aaa;">MK ${item.price.toLocaleString()} each</div>
                        <div class="cart-item-actions">
                            <button class="qty-btn" onclick="updateQty(${item.id}, -1)">-</button>
                            <span style="padding: 0 10px;">${item.qty}</span>
                            <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
                            <button class="btn btn-outline" style="padding: 5px 10px; margin-left: auto;" onclick="removeFromCart(${item.id})">Remove</button>
                        </div>
                    </div>
                </div>
            `).join('');
            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            document.getElementById('cartTotal').textContent = `Total: MK ${total.toLocaleString()}`;
        }

        function updateQty(id, change) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.qty += change;
                if (item.qty <= 0) {
                    removeFromCart(id);
                } else {
                    saveCart();
                    renderCart();
                    updateCartCount();
                }
            }
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            saveCart();
            renderCart();
            updateCartCount();
        }

        function saveCart() {
            localStorage.setItem('blvck_cart', JSON.stringify(cart));
        }

        // CHECKOUT
        function updateDeliveryPrice() {
            const select = document.getElementById('deliveryLocation');
            const price = parseInt(select.options[select.selectedIndex].dataset.price);
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const total = subtotal + price;
            document.getElementById('checkoutSummary').innerHTML = `
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span>Subtotal:</span>
                    <span>MK ${subtotal.toLocaleString()}</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span>Delivery:</span>
                    <span>MK ${price.toLocaleString()}</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-weight: 700; font-size: 1.2rem; border-top: 1px solid #333; padding-top: 10px;">
                    <span>Total:</span>
                    <span>MK ${total.toLocaleString()}</span>
                </div>
            `;
        }

        function sendWhatsAppOrder() {
            const name = document.getElementById('customerName').value;
            const phone = document.getElementById('customerPhone').value;
            const location = document.getElementById('deliveryLocation').value;
            const deliveryPrice = parseInt(document.getElementById('deliveryLocation').options[document.getElementById('deliveryLocation').selectedIndex].dataset.price);
            
            if (!name || !phone) {
                alert('Please fill in your name and phone number');
                return;
            }
            
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const total = subtotal + deliveryPrice;
            
            let message = `*NEW ORDER - BLVCK ACCESSORIES*%0A%0A`;
            message += `*Customer:* ${name}%0A*Phone:* ${phone}%0A*Location:* ${location}%0A%0A*Items:*%0A`;
            cart.forEach(item => {
                message += `- ${item.name} x${item.qty} = MK ${(item.price * item.qty).toLocaleString()}%0A`;
            });
            message += `%0A*Subtotal:* MK ${subtotal.toLocaleString()}%0A*Delivery:* MK ${deliveryPrice.toLocaleString()}%0A*TOTAL:* MK ${total.toLocaleString()}`;
            
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${message}`, '_blank');
            cart = [];
            saveCart();
            updateCartCount();
            closeModal('checkoutModal');
            alert('Order sent! We will contact you on WhatsApp to confirm.');
        }

        // ADMIN
        function login() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                isAdmin = true;
                closeModal('loginModal');
                openModal('adminModal');
                renderAdminProducts();
                document.getElementById('adminPassword').value = '';
            } else {
                alert('Wrong password');
            }
        }

        function logout() {
            isAdmin = false;
            closeModal('adminModal');
        }

        function renderAdminProducts() {
            const grid = document.getElementById('adminProductGrid');
            grid.innerHTML = products.map(p => `
                <div class="admin-card">
                    <img src="${p.image}" alt="${p.name}" style="width: 100%; height: 150px; object-fit: cover; border-radius: 5px; margin-bottom: 10px;">
                    <div style="font-weight: 600; margin-bottom: 5px;">${p.name}</div>
                    <div style="color: #aaa; margin-bottom: 10px;">MK ${p.price.toLocaleString()}</div>
                    <button class="btn btn-outline" style="width: 100%;" onclick="deleteProduct(${p.id})">Delete</button>
                </div>
            `).join('');
        }

        function addProduct() {
            const name = document.getElementById('newProductName').value;
            const price = parseInt(document.getElementById('newProductPrice').value);
            const image = document.getElementById('newProductImage').value;
            const desc = document.getElementById('newProductDesc').value;
            
            if (!name || !price || !image) {
                alert('Please fill in name, price, and image URL');
                return;
            }
            
            const newProduct = {
                id: Date.now(),
                name,
                price,
                image,
                desc
            };
            
            products.push(newProduct);
            localStorage.setItem('blvck_products', JSON.stringify(products));
            renderProducts();
            renderAdminProducts();
            closeModal('addProductModal');
            
            // Clear form
            document.getElementById('newProductName').value = '';
            document.getElementById('newProductPrice').value = '';
            document.getElementById('newProductImage').value = '';
            document.getElementById('newProductDesc').value = '';
            
            alert('Product added!');
        }

        function deleteProduct(id) {
            if (confirm('Delete this product?')) {
                products = products.filter(p => p.id !== id);
                localStorage.setItem('blvck_products', JSON.stringify(products));
                renderProducts();
                renderAdminProducts();
            }
        }

        // MODALS
        function openModal(id) {
            document.getElementById(id).style.display = 'block';
            if (id === 'cartModal') renderCart();
            if (id === 'checkoutModal') updateDeliveryPrice();
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        // Close modal on outside click
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }
    </script>
</body>
</html>
